version: '3.8'
services:
  bookgen:
    build: .
    container_name: bookgen_app
    volumes:
      - .:/app
      - /app/venv_xtts_311/
      # Esto mapea los modelos al disco local para que persistan
      - ./tts_models:/root/.local/share/tts
    environment:
      - COQUI_TOS_AGREED=1 # Acepta los términos de Coqui automáticamente
    stdin_open: true
    tty: true